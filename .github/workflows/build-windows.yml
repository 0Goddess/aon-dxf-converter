name: Build Windows portable app

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Prepare Traditional Chinese font
        run: |
          npm install --no-save --ignore-scripts @fontsource/noto-sans-tc@5.2.9
          python prepare_font.py

      - name: Build portable application
        run: python -m PyInstaller --noconfirm AON_XML_to_DXF.spec

      - name: Package application
        shell: pwsh
        run: |
          Copy-Item README_使用說明.txt dist/AON_XML_to_DXF/
          Copy-Item THIRD_PARTY_NOTICES.txt dist/AON_XML_to_DXF/
          Compress-Archive -Path dist/AON_XML_to_DXF/* -DestinationPath dist/AON_XML_to_DXF_Windows64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: AON_XML_to_DXF_Windows64
          path: dist/AON_XML_to_DXF_Windows64.zip
